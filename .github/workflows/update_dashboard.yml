name: Update Training Dashboard

on:
  schedule:
    - cron: '0 23 * * *'   # 23:00 UTC = midnight Munich (CET), 11pm in summer (CEST adjust manually)
  workflow_dispatch:         # manual trigger button in GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install garminconnect python-dotenv fitparse

      - name: Download and parse new activities
        env:
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python garmin_download.py

      - name: Build dashboard data
        run: python build_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fit_files/*.json dashboard_data.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "Dashboard update $(date -u '+%Y-%m-%d %H:%M UTC')" && git push
