name: Update Training Dashboard

on:
  schedule:
    - cron: '0 23 * * *'   # 23:00 UTC nightly
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install garminconnect python-dotenv fitparse numpy requests

      - name: Download new Garmin activities
        env:
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python3 garmin_download.py

      - name: Fetch intervals.icu data
        env:
          ICU_API_KEY:    ${{ secrets.ICU_API_KEY }}
          ICU_ATHLETE_ID: ${{ secrets.ICU_ATHLETE_ID }}
        run: python3 fetch_icu_data.py

      - name: Rebuild all data
        env:
          ICU_API_KEY:    ${{ secrets.ICU_API_KEY }}
          ICU_ATHLETE_ID: ${{ secrets.ICU_ATHLETE_ID }}
        run: |
          chmod +x rebuild_all.sh
          ./rebuild_all.sh --from 1

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fit_files/*.json dashboard_data.json icu_data.json \
                  running_cloud.json cycling_cloud.json cycling_curve.json \
                  running_bests.json || true
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "Dashboard update $(date -u '+%Y-%m-%d %H:%M UTC')" && git push
